name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "cloudflare-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            project-name: canopy-lambda-editor
            type: pages
            # Retry-wrapped: transient mooncakes CDN 403 (issue #467) auto-recovers.
            moon-update: |
              "$GITHUB_WORKSPACE/scripts/moon-update.sh"
              cd graphviz && "$GITHUB_WORKSPACE/scripts/moon-update.sh"
            moon-build: |
              moon build --target js --release
              cd graphviz && moon build --target js --release
            npm-dir: examples/web
            deploy-dir: examples/web/dist

          - name: ideal
            project-name: canopy-ideal
            type: pages
            # Build with workspace on. See #335 for target override caveat.
            moon-update: cd examples/ideal && "$GITHUB_WORKSPACE/scripts/moon-update.sh"
            moon-build: cd examples/ideal && moon build --target js --release
            npm-dir: examples/ideal/web
            deploy-dir: examples/ideal/web/dist

          - name: prosemirror
            project-name: canopy-prosemirror
            type: pages
            moon-update: '"$GITHUB_WORKSPACE/scripts/moon-update.sh"'
            moon-build: moon build --target js --release
            npm-dir: examples/prosemirror
            deploy-dir: examples/prosemirror/dist

          - name: demo-react
            project-name: canopy-demo-react
            type: pages
            moon-update: '"$GITHUB_WORKSPACE/scripts/moon-update.sh"'
            moon-build: moon build --target js --release
            npm-dir: examples/demo-react
            deploy-dir: examples/demo-react/dist

          - name: block-editor
            project-name: canopy-block-editor
            type: pages
            # Build with workspace on. See #335 for target override caveat.
            moon-update: cd examples/block-editor && "$GITHUB_WORKSPACE/scripts/moon-update.sh"
            moon-build: cd examples/block-editor && moon build --target js --release
            npm-dir: examples/block-editor/web
            deploy-dir: examples/block-editor/web/dist

          - name: canvas
            project-name: canopy-canvas
            type: pages
            # Build with workspace on. See #335 for target override caveat.
            moon-update: cd examples/canvas && "$GITHUB_WORKSPACE/scripts/moon-update.sh"
            moon-build: cd examples/canvas && moon build --target js --release
            npm-dir: examples/canvas/web
            deploy-dir: examples/canvas/web/dist

          - name: relay-server
            project-name: canopy-relay
            type: workers
            moon-update: '"$GITHUB_WORKSPACE/scripts/moon-update.sh"'
            moon-build: moon build --target js --release
            npm-dir: examples/relay-server
            deploy-dir: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        if: matrix.moon-build != ''
        uses: ./.github/actions/setup-moonbit

      - name: Update MoonBit dependencies
        if: matrix.moon-update != ''
        run: ${{ matrix.moon-update }}

      - name: Build MoonBit modules
        if: matrix.moon-build != ''
        run: ${{ matrix.moon-build }}

      - name: Link workspace build artifacts (#335)
        if: matrix.moon-build != '' && matrix.type == 'pages'
        # Workspace mode puts JS output in root _build/ (<mod>/<pkg>),
        # but vite-plugin-moonbit expects it under the example's local
        # _build/ (<pkg>/).  Symlink to bridge the gap.
        run: |
          EXAMPLE="${{ matrix.name }}"
          # Map matrix name to module name in _build/
          case "$EXAMPLE" in
            block-editor) MOD="dowdiness/canopy-block-editor" ;;
            canvas)      MOD="dowdiness/canopy-canvas" ;;
            ideal)       MOD="dowdiness/ideal-editor" ;;
            *)          MOD="" ;;
          esac
          if [ -n "$MOD" ]; then
            SRC="$GITHUB_WORKSPACE/_build/js/release/build/$MOD/main"
            DST="$GITHUB_WORKSPACE/examples/$EXAMPLE/_build/js/release/build/main"
            if [ -d "$SRC" ]; then
              mkdir -p "$(dirname "$DST")"
              ln -sfn "$SRC" "$DST"
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.npm-dir }}/package-lock.json

      - name: Install npm dependencies
        run: cd ${{ matrix.npm-dir }} && npm ci

      - name: Build
        if: matrix.type == 'pages'
        run: cd ${{ matrix.npm-dir }} && npx vite build

      - name: Deploy to Cloudflare Pages
        if: matrix.type == 'pages'
        run: npx wrangler pages deploy ${{ matrix.deploy-dir }} --project-name ${{ matrix.project-name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: matrix.type == 'workers'
        run: cd ${{ matrix.npm-dir }} && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
