name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep-check:
    name: Dependency Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run check-deps
        run: ./scripts/check-deps.sh

      - name: Check shared-substrate version drift
        run: ./scripts/check-shared-substrate.sh

      - name: Check egw resolver identity
        run: ./scripts/check-egw-resolver-identity.sh

      - name: Check moon update is retry-wrapped
        run: ./scripts/check-moon-update-wrapped.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check FFI export manifest (lambda app seam)
        run: node ./scripts/check-export-manifest.mjs

      - name: Test moon update retry wrapper
        run: ./scripts/test-moon-update-wrapper.sh

  test-main:
    name: Test Main Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Update dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Check code
        run: |
          bash ./scripts/check-agent-doc-links.sh
          # check-strict: runs moon check --deny-warn and filters output.
          # Only errors from vendored rabbita/rabbita/ paths are suppressed;
          # any error from Canopy-owned code fails CI. This is stricter than
          # check-lenient (--warn-list=-20) which exempted try? for all
          # workspace members.
          ./scripts/check-strict.sh

      - name: Run tests
        # Gated on rabbita's 7 pre-existing JS test failures (DOM, URL
        # formatting). check-test-baseline.sh extracts "failed: N" from the
        # output and only fails if the count exceeds the known baseline.
        # This allows real regressions (>7 failures) to surface while
        # absorbing the vendored rabbita noise.
        run: ./scripts/check-test-baseline.sh 7 moon test --release

      - name: Build
        run: moon build --release

  test-submodules:
    name: Test Submodules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Vendored submodules built standalone — event-graph-walker and loom
          # still use deprecated try? ([0020]); canopy can't migrate their
          # source, so they run in ci-lenient mode (exempts only [0020]).
          - name: event-graph-walker
            path: event-graph-walker
            mode: ci-lenient
          - name: loom
            path: loom/loom
            mode: ci-lenient
          - name: svg-dsl
            path: svg-dsl
            # ci-lenient: now a workspace member (visualizer migration).
            # Inherits vendored-submodule warnings from other members.
            mode: ci-lenient
          - name: graphviz
            path: graphviz
            mode: ci-lenient
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        # Gated on rabbita's 7 pre-existing JS test failures. check-test-baseline.sh
        # suppresses only those known failures; real check failures or unexpected
        # test failures propagate to fail the job (unlike continue-on-error which
        # masked all failures).
        run: ./scripts/check-test-baseline.sh 7 ./scripts/run-moon-module.sh "${{ matrix.mode }}" "${{ matrix.path }}"

  test-examples:
    name: Test MoonBit Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ci-lenient: examples are workspace members; the vendored rabbita
          # submodule (now a workspace member too) has pre-existing try?
          # [0020] warnings that --deny-warn would escalate to errors.
          # Same exemption used by event-graph-walker, loom, and root.
          - name: ideal
            path: examples/ideal
            mode: ci-lenient
          - name: block-editor
            path: examples/block-editor
            mode: ci-lenient
          - name: canvas
            path: examples/canvas
            mode: ci-lenient
          - name: codemirror_demo
            path: examples/codemirror_demo
            mode: ci-lenient
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        # Gated on rabbita's 7 pre-existing JS test failures. The baseline
        # check gates only on the test failure count; the moon check still
        # runs with --deny-warn --warn-list=-20 via ci-lenient mode.
        run: ./scripts/check-test-baseline.sh 7 ./scripts/run-moon-module.sh "${{ matrix.mode }}" "${{ matrix.path }}"

  prove:
    name: Formal Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Cache opam switch
        id: opam-cache
        uses: actions/cache@v5
        with:
          path: ~/.opam
          key: opam-why3-1.7.2-z3-${{ runner.os }}-${{ runner.arch }}

      - name: Install opam
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq opam

      - name: Initialize opam and install Why3/Z3
        if: steps.opam-cache.outputs.cache-hit != 'true'
        run: |
          opam init --disable-sandboxing --yes
          eval $(opam env)
          opam install why3.1.7.2 z3 --yes

      - name: Configure Why3 provers
        run: |
          eval $(opam env)
          why3 config detect

      - name: Update MoonBit dependencies
        working-directory: lib/semantic/proof
        # Retry-wrapped: transient mooncakes CDN 403 (issue #467) auto-recovers.
        run: |
          "$GITHUB_WORKSPACE/scripts/moon-update.sh"

      - name: Run moon prove
        working-directory: lib/semantic/proof
        run: |
          eval $(opam env)
          moon prove

  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Run main module benchmarks
        # Workspace includes vendored submodules (alga) with pre-existing
        # benchmark failures (stack overflow in graph algorithms).
        run: moon bench --release
        continue-on-error: true

      - name: Run event-graph-walker benchmarks
        # Vendored submodule errors surface during workspace bench runs.
        continue-on-error: true
        working-directory: event-graph-walker
        run: |
          "$GITHUB_WORKSPACE/scripts/moon-update.sh"
          moon bench --release

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Check formatting
        # NEW_MOON_MOD=0 handles the mixed-manifest workspace (Canopy-owned
        # moon.mod + legacy loom submodule moon.mod.json).  Without it,
        # moon fmt aborts on loom's moon.mod.json path deps before formatting
        # any Canopy files, and the || true fallthrough would report success.
        run: |
          bash ./scripts/check-agent-doc-links.sh
          NEW_MOON_MOD=0 moon fmt
          # Vendored submodule directories — formatting changes here are accepted.
          # Matches both 'dir/' (subdirectory changes) and 'dir' (submodule pointer).
          VENDORED='^(alga|event-graph-walker|graphviz|loom|order-tree|rabbita|rle|svg-dsl)(/.*)?$'
          CHANGED=$(git diff --name-only)
          if [ -z "$CHANGED" ]; then
            echo "Format check passed (no changes)."
          elif echo "$CHANGED" | grep -qvE "$VENDORED"; then
            echo "Formatting errors in Canopy-owned files:" >&2
            echo "$CHANGED" | grep -vE "$VENDORED" >&2
            exit 1
          fi
          echo "Format check passed (vendored-only formatting changes accepted)."

  build-js:
    name: Build JavaScript Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Build JavaScript artifacts
        run: ./scripts/build-js.sh

      - name: Upload JS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: moonbit-js-build
          path: |
            _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.js
            _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/lambda/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/json/json.js
            _build/js/release/build/dowdiness/canopy/ffi/json/json.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/json/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/markdown/markdown.js
            _build/js/release/build/dowdiness/canopy/ffi/markdown/markdown.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/markdown/moonbit.d.ts
            _build/js/release/build/dowdiness/graphviz/browser/browser.js
            _build/js/release/build/dowdiness/graphviz/browser/browser.d.ts
          retention-days: 7

  typecheck-ts-examples:
    name: Type Check TS Examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            path: examples/web
          - name: prosemirror
            path: examples/prosemirror
          - name: canvas
            path: examples/canvas/web
          - name: demo-react
            path: examples/demo-react
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Update MoonBit dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Build MoonBit JS artifacts
        run: ./scripts/build-js.sh

      - name: Build Canvas MoonBit JS artifacts
        if: matrix.name == 'canvas'
        working-directory: examples/canvas
        # Workspace mode: vite/tsconfig paths updated to use workspace-level
        # _build (../../_build/...). No MOON_WORK=off needed — rabbit libs'
        # moon.mod imports resolve via workspace membership.
        run: |
          ../../scripts/moon-update.sh
          moon build --target js --release

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Type check
        working-directory: ${{ matrix.path }}
        run: npx tsc --noEmit

  web-build:
    name: Build Web Example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Update MoonBit dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Build web
        run: ./scripts/build-web.sh

  web-e2e:
    name: Web E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/web
        run: npm ci

      - name: Update MoonBit dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Run web Playwright suite
        run: ./scripts/test-web-e2e.sh

  ideal-web-e2e:
    name: Ideal Web E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/ideal/web/package-lock.json

      - name: Install Ideal editor web dependencies
        working-directory: examples/ideal/web
        run: npm ci

      - name: Run Ideal editor Playwright suite
        run: ./scripts/test-ideal-web-e2e.sh

  demo-react-e2e:
    name: Demo React E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/demo-react/package-lock.json

      - name: Install demo-react dependencies
        working-directory: examples/demo-react
        run: npm ci

      - name: Update MoonBit dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Run demo-react Playwright suite
        run: ./scripts/test-demo-react-e2e.sh

  canvas-e2e:
    name: Canvas E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/canvas/web/package-lock.json

      - name: Install canvas web dependencies
        working-directory: examples/canvas/web
        run: npm ci

      - name: Run canvas Playwright suite
        run: ./scripts/test-canvas-e2e.sh

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - dep-check
      - test-main
      - test-submodules
      - test-examples
      - prove
      - format-check
      - build-js
      - typecheck-ts-examples
      - web-build
      - web-e2e
      - ideal-web-e2e
      - demo-react-e2e
      - canvas-e2e
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          if [[ "${{ needs.dep-check.result }}" != "success" ]] || \
             [[ "${{ needs.test-main.result }}" != "success" ]] || \
             [[ "${{ needs.test-submodules.result }}" != "success" ]] || \
             [[ "${{ needs.test-examples.result }}" != "success" ]] || \
             [[ "${{ needs.prove.result }}" != "success" ]] || \
             [[ "${{ needs.format-check.result }}" != "success" ]] || \
             [[ "${{ needs.build-js.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck-ts-examples.result }}" != "success" ]] || \
             [[ "${{ needs.web-build.result }}" != "success" ]] || \
             [[ "${{ needs.web-e2e.result }}" != "success" ]] || \
             [[ "${{ needs.ideal-web-e2e.result }}" != "success" ]] || \
             [[ "${{ needs.demo-react-e2e.result }}" != "success" ]] || \
             [[ "${{ needs.canvas-e2e.result }}" != "success" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
