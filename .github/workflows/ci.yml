name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep-check:
    name: Dependency Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Run check-deps
        run: ./scripts/check-deps.sh

      - name: Check shared-substrate version drift
        run: ./scripts/check-shared-substrate.sh

      - name: Check egw resolver identity
        run: ./scripts/check-egw-resolver-identity.sh

      - name: Check moon update is retry-wrapped
        run: ./scripts/check-moon-update-wrapped.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Check FFI export manifest (lambda app seam)
        run: node ./scripts/check-export-manifest.mjs

      - name: Test moon update retry wrapper
        run: ./scripts/test-moon-update-wrapper.sh

  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_prove: ${{ steps.filter.outputs.run_prove }}
      run_e2e: ${{ steps.filter.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            run_prove:
              - 'lib/semantic/proof/**'
              - '.github/actions/setup-moonbit/**'
              - '.github/workflows/ci.yml'
              - 'scripts/moon-update.sh'
            run_e2e:
              - 'examples/web/**'
              - 'examples/ideal/**'
              - 'examples/demo-react/**'
              - 'examples/canvas/**'
              - '.github/workflows/ci.yml'
              - 'scripts/build-js.sh'
              - 'scripts/test-*.sh'

  test-main:
    name: Test Main Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Update dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Check code
        run: |
          bash ./scripts/check-agent-doc-links.sh
          ./scripts/check-strict.sh


      - name: Check moon.pkg compatibility with pinned toolchain
        run: ./scripts/check-moonbit-pkg-compat.sh
      - name: Run tests
        run: ./scripts/check-test-baseline.sh 7 moon test --release

      - name: Build
        run: moon build --release

  test-submodules:
    name: Test Submodules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: event-graph-walker
            path: event-graph-walker
            mode: ci-lenient
          - name: loom
            path: loom/loom
            mode: ci-lenient
          - name: svg-dsl
            path: svg-dsl
            mode: ci-lenient
          - name: graphviz
            path: graphviz
            mode: ci-lenient
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        run: ./scripts/check-test-baseline.sh 7 ./scripts/run-moon-module.sh "${{ matrix.mode }}" "${{ matrix.path }}"

  test-examples:
    name: Test MoonBit Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: ideal
            path: examples/ideal
            mode: ci-lenient
          - name: block-editor
            path: examples/block-editor
            mode: ci-lenient
          - name: canvas
            path: examples/canvas
            mode: ci-lenient
          - name: codemirror_demo
            path: examples/codemirror_demo
            mode: ci-lenient
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Verify MoonBit installation
        run: moon version --all

      - name: Check and test ${{ matrix.name }}
        run: ./scripts/check-test-baseline.sh 7 ./scripts/run-moon-module.sh "${{ matrix.mode }}" "${{ matrix.path }}"

  prove:
    name: Formal Verification
    needs: [changes]
    if: needs.changes.outputs.run_prove == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Cache opam switch
        id: opam-cache
        uses: actions/cache@v6
        with:
          path: ~/.opam
          key: opam-why3-1.7.2-z3-${{ runner.os }}-${{ runner.arch }}

      - name: Install opam
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq opam

      - name: Initialize opam and install Why3/Z3
        if: steps.opam-cache.outputs.cache-hit != 'true'
        run: |
          opam init --disable-sandboxing --yes
          eval $(opam env)
          opam install why3.1.7.2 z3 --yes

      - name: Configure Why3 provers
        run: |
          eval $(opam env)
          why3 config detect

      - name: Update MoonBit dependencies
        working-directory: lib/semantic/proof
        run: |
          "$GITHUB_WORKSPACE/scripts/moon-update.sh"

      - name: Run moon prove
        working-directory: lib/semantic/proof
        run: |
          eval $(opam env)
          moon prove

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Check formatting
        run: |
          bash ./scripts/check-agent-doc-links.sh
          NEW_MOON_MOD=0 moon fmt
          VENDORED='^(alga|event-graph-walker|graphviz|loom|order-tree|rabbita|rle|svg-dsl)(/.*)?$'
          CHANGED=$(git diff --name-only)
          if [ -z "$CHANGED" ]; then
            echo "Format check passed (no changes)."
          elif echo "$CHANGED" | grep -qvE "$VENDORED"; then
            echo "Formatting errors in Canopy-owned files:" >&2
            echo "$CHANGED" | grep -vE "$VENDORED" >&2
            exit 1
          fi
          echo "Format check passed (vendored-only formatting changes accepted)."

  build-js:
    name: Build JavaScript Target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Update dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Build JavaScript artifacts
        run: ./scripts/build-js.sh

      - name: Check moon.pkg compatibility with pinned toolchain
        run: ./scripts/check-moonbit-pkg-compat.sh

      - name: Upload JS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: moonbit-js-build
          path: |
            _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.js
            _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/lambda/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/json/json.js
            _build/js/release/build/dowdiness/canopy/ffi/json/json.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/json/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/markdown/markdown.js
            _build/js/release/build/dowdiness/canopy/ffi/markdown/markdown.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/markdown/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/jsx/jsx.js
            _build/js/release/build/dowdiness/canopy/ffi/jsx/jsx.d.ts
            _build/js/release/build/dowdiness/canopy/ffi/jsx/moonbit.d.ts
            _build/js/release/build/dowdiness/graphviz/browser/browser.js
            _build/js/release/build/dowdiness/graphviz/browser/browser.d.ts
            _build/js/release/build/dowdiness/ideal-editor/main/main.js
            _build/js/release/build/dowdiness/ideal-editor/main/main.d.ts
            _build/js/release/build/dowdiness/ideal-editor/main/moonbit.d.ts
            _build/js/release/build/dowdiness/canopy-canvas/main/main.js
            _build/js/release/build/dowdiness/canopy-canvas/main/main.d.ts
            _build/js/release/build/dowdiness/canopy-canvas/main/moonbit.d.ts
          retention-days: 7

  web-build:
    name: Build Web Example
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            examples/web/package-lock.json
            examples/prosemirror/package-lock.json

      - name: Update MoonBit dependencies
        run: ./scripts/update-moon-deps.sh

      - name: Build web
        run: ./scripts/build-web.sh

      - name: Type check web
        working-directory: examples/web
        run: npm run typecheck

      - name: Check web dependency boundaries
        working-directory: examples/web
        run: npm run check:boundaries

      - name: Test web dependency boundaries
        working-directory: examples/web
        run: npm run test:boundaries

      - name: Install prosemirror dependencies
        working-directory: examples/prosemirror
        run: npm ci

      - name: Type check prosemirror
        working-directory: examples/prosemirror
        run: npx tsc --noEmit

  web-e2e:
    name: Web E2E
    needs: [build-js, changes]
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
      options: --ipc=host
    env:
      CANOPY_SKIP_MOON_BUILD: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download MoonBit JS artifacts
        uses: actions/download-artifact@v7
        with:
          name: moonbit-js-build
          path: _build/js/release/build/dowdiness

      - name: Verify downloaded artifacts
        run: |
          test -f _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.js
          test -f _build/js/release/build/dowdiness/canopy/ffi/json/json.js
          echo "All required MoonBit JS artifacts verified"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/web
        run: npm ci

      - name: Run web Playwright suite
        run: ./scripts/test-web-e2e.sh

  ideal-web-e2e:
    name: Ideal Web E2E
    needs: [build-js, changes]
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    env:
      CANOPY_SKIP_MOON_BUILD: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download MoonBit JS artifacts
        uses: actions/download-artifact@v7
        with:
          name: moonbit-js-build
          path: _build/js/release/build/dowdiness

      - name: Verify downloaded artifacts
        run: |
          test -f _build/js/release/build/dowdiness/ideal-editor/main/main.js
          echo "All required MoonBit JS artifacts verified"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/ideal/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/ideal/web
        run: npm ci

      - name: Run Ideal editor Playwright suite
        run: ./scripts/test-ideal-web-e2e.sh

  demo-react-e2e:
    name: Demo React E2E
    needs: [build-js, changes]
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --ipc=host
    env:
      CANOPY_SKIP_MOON_BUILD: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download MoonBit JS artifacts
        uses: actions/download-artifact@v7
        with:
          name: moonbit-js-build
          path: _build/js/release/build/dowdiness

      - name: Verify downloaded artifacts
        run: |
          test -f _build/js/release/build/dowdiness/canopy/ffi/lambda/lambda.js
          echo "All required MoonBit JS artifacts verified"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/demo-react/package-lock.json

      - name: Install demo-react dependencies
        working-directory: examples/demo-react
        run: npm ci

      - name: Run demo-react Playwright suite
        run: ./scripts/test-demo-react-e2e.sh

  canvas-e2e:
    name: Canvas E2E
    needs: [build-js, changes]
    if: needs.changes.outputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    env:
      CANOPY_SKIP_MOON_BUILD: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Download MoonBit JS artifacts
        uses: actions/download-artifact@v7
        with:
          name: moonbit-js-build
          path: _build/js/release/build/dowdiness

      - name: Verify downloaded artifacts
        run: |
          test -f _build/js/release/build/dowdiness/canopy-canvas/main/main.js
          echo "All required MoonBit JS artifacts verified"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/canvas/web/package-lock.json

      - name: Install canvas web dependencies
        working-directory: examples/canvas/web
        run: npm ci

      - name: Run canvas Playwright suite
        run: ./scripts/test-canvas-e2e.sh

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - dep-check
      - changes
      - test-main
      - test-submodules
      - test-examples
      - prove
      - format-check
      - build-js
      - web-build
      - web-e2e
      - ideal-web-e2e
      - demo-react-e2e
      - canvas-e2e
    if: always()
    steps:
      - name: Check all job statuses
        run: |
          ok() { [[ "$1" == "success" || "$1" == "skipped" ]]; }
          if ! ok "${{ needs.dep-check.result }}" || \
             ! ok "${{ needs.changes.result }}" || \
             ! ok "${{ needs.test-main.result }}" || \
             ! ok "${{ needs.test-submodules.result }}" || \
             ! ok "${{ needs.test-examples.result }}" || \
             ! ok "${{ needs.prove.result }}" || \
             ! ok "${{ needs.format-check.result }}" || \
             ! ok "${{ needs.build-js.result }}" || \
             ! ok "${{ needs.web-build.result }}" || \
             ! ok "${{ needs.web-e2e.result }}" || \
             ! ok "${{ needs.ideal-web-e2e.result }}" || \
             ! ok "${{ needs.demo-react-e2e.result }}" || \
             ! ok "${{ needs.canvas-e2e.result }}"; then
            echo "❌ One or more required checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
