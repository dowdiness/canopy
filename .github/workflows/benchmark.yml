name: Benchmark Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark-gate:
    name: Benchmark Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run_moon_benchmarks: ${{ steps.filter.outputs.run_moon_benchmarks }}
      run_editor_response: ${{ steps.filter.outputs.run_editor_response }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect benchmark-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            run_moon_benchmarks:
              - '**/*.mbt'
              - '**/moon.pkg'
              - '**/moon.mod'
              - '**/moon.mod.json'
              - 'moon.work'
              - 'alga'
              - 'event-graph-walker'
              - 'graphviz'
              - 'loom'
              - 'order-tree'
              - 'rabbita'
              - 'rle'
              - 'svg-dsl'
              - '.github/actions/setup-moonbit/**'
              - '.github/workflows/benchmark.yml'
              - 'scripts/moon-update.sh'
              - 'scripts/run-moon-module.sh'
            run_editor_response:
              - 'examples/ideal/**'
              - 'examples/web/vite-plugin-moonbit.ts'
              - '.github/actions/setup-moonbit/**'
              - '.github/workflows/benchmark.yml'
              - 'scripts/moon-update.sh'

  benchmark-pr:
    name: Benchmark PR Branch
    needs: benchmark-gate
    if: needs.benchmark-gate.outputs.run_moon_benchmarks == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Run PR benchmarks
        # Workspace includes vendored submodules (alga) with pre-existing
        # benchmark failures (stack overflow in graph algorithms).
        continue-on-error: true
        run: |
          echo "Running benchmarks on PR branch..."
          if ./scripts/run-moon-module.sh bench . > pr_bench.txt 2>&1; then
            cat pr_bench.txt
          else
            cat pr_bench.txt
            echo "(PR benchmark failed — pre-existing vendored submodule issues)"
          fi

      - name: Run submodule benchmarks (event-graph-walker)
        # Vendored submodule errors (alga trait mismatches, try? warnings)
        # surface during workspace bench runs.  Continue on error — the
        # comparison is informational, not a gate.
        continue-on-error: true
        run: |
          if ./scripts/run-moon-module.sh bench event-graph-walker > pr_egw_bench.txt 2>&1; then
            cat pr_egw_bench.txt
          else
            cat pr_egw_bench.txt
            echo "(egw benchmark failed — pre-existing vendored submodule issues)"
            exit 0
          fi

      - name: Upload PR benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: pr-benchmark-results
          path: |
            pr_bench.txt
            pr_egw_bench.txt
          retention-days: 7

  benchmark-base:
    name: Benchmark Base Branch
    needs: benchmark-gate
    if: needs.benchmark-gate.outputs.run_moon_benchmarks == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Restore base benchmark cache
        id: base-benchmark-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            base_bench.txt
            base_egw_bench.txt
          key: benchmark-base-${{ runner.os }}-${{ github.event.pull_request.base.sha || github.ref_name }}

      - name: Checkout base branch
        if: steps.base-benchmark-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref || github.event.repository.default_branch }}
          submodules: recursive

      - name: Set up MoonBit
        if: steps.base-benchmark-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-moonbit

      - name: Run base benchmarks
        if: steps.base-benchmark-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          echo "Running benchmarks on base branch..."
          if "$GITHUB_WORKSPACE/scripts/moon-update.sh" && moon bench --release > base_bench.txt 2>&1; then
            cat base_bench.txt
          else
            echo "(base branch benchmark failed — may not compile)" > base_bench.txt
            cat base_bench.txt
          fi

      - name: Run submodule benchmarks (base - event-graph-walker)
        if: steps.base-benchmark-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          if (
            cd event-graph-walker
            "$GITHUB_WORKSPACE/scripts/moon-update.sh"
            moon bench --release
          ) > base_egw_bench.txt 2>&1; then
            cat base_egw_bench.txt
          else
            echo "(base branch benchmark failed — may not compile)" > base_egw_bench.txt
            cat base_egw_bench.txt
          fi

      - name: Save base benchmark cache
        if: always() && steps.base-benchmark-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            base_bench.txt
            base_egw_bench.txt
          key: ${{ steps.base-benchmark-cache.outputs.cache-primary-key }}

      - name: Upload base benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: base-benchmark-results
          path: |
            base_bench.txt
            base_egw_bench.txt
          retention-days: 7

  benchmark-comparison:
    name: Compare Benchmarks
    needs: [benchmark-gate, benchmark-pr, benchmark-base]
    if: always() && (needs.benchmark-gate.outputs.run_moon_benchmarks == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download PR benchmark results
        uses: actions/download-artifact@v7
        with:
          name: pr-benchmark-results
          path: benchmark-results/pr

      - name: Download base benchmark results
        uses: actions/download-artifact@v7
        with:
          name: base-benchmark-results
          path: benchmark-results/base

      - name: Compare results
        id: compare
        run: |
          base_ref="${{ github.base_ref || github.event.repository.default_branch }}"
          {
            echo "## Benchmark Comparison Report"
            echo ""
            echo "Comparing PR branch against \`${base_ref}\`"
            echo ""

            echo "### Main Module Benchmarks"
            echo ""
            echo "**Base branch:**"
            echo '```'
            cat benchmark-results/base/base_bench.txt
            echo '```'
            echo ""

            echo "**PR branch:**"
            echo '```'
            cat benchmark-results/pr/pr_bench.txt
            echo '```'
            echo ""

            echo "### event-graph-walker Benchmarks"
            echo ""
            echo "**Base branch:**"
            echo '```'
            cat benchmark-results/base/base_egw_bench.txt
            echo '```'
            echo ""

            echo "**PR branch:**"
            echo '```'
            cat benchmark-results/pr/pr_egw_bench.txt
            echo '```'
            echo ""

            echo "---"
            echo "*Benchmarks run with \`--release\` flag*"
          } > comparison.md

      - name: Post comment to PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('comparison.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Benchmark Comparison Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comparison
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comparison
              });
            }

      - name: Upload benchmark comparison
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-comparison
          path: |
            benchmark-results/base/base_bench.txt
            benchmark-results/pr/pr_bench.txt
            benchmark-results/base/base_egw_bench.txt
            benchmark-results/pr/pr_egw_bench.txt
            comparison.md
          retention-days: 30

  editor-response-benchmark:
    name: Editor Response Benchmark
    needs: benchmark-gate
    if: needs.benchmark-gate.outputs.run_editor_response == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: examples/ideal/web/package-lock.json

      - name: Install web dependencies
        working-directory: examples/ideal/web
        run: npm ci

      - name: Install Playwright browser
        working-directory: examples/ideal/web
        run: npx playwright install --with-deps chromium

      - name: Update MoonBit dependencies
        working-directory: examples/ideal
        # Retry-wrapped: transient mooncakes CDN 403 (issue #467) auto-recovers.
        run: |
          "$GITHUB_WORKSPACE/scripts/moon-update.sh"

      - name: Run realistic editor response benchmark
        working-directory: examples/ideal/web
        env:
          # CI-only paint budget for the 10% trimmed-mean gate (#460, the durable
          # fix for the single-run-p95 flakiness #458/#459 papered over with a 175
          # ms p95 budget). The trimmed mean drops the 1-2 transient slow paints
          # per run that made p95 noisy, so the gate tracks the runner's central
          # latency. 130 is derived from the observed CI distribution (12 runs):
          # worst central tendency ~95-97 ms plus ~3.5 sigma of the ~9.6 ms
          # between-run baseline drift. It is a calibrated empirical ceiling (n=12,
          # not a strong statistical bound) — meaningfully tighter than the old 175
          # (catches a ~+37% regression on the ~95 ms CI baseline vs ~+119% before)
          # while leaving ~35% headroom over the worst clean run. The 100 ms local
          # default in the spec is preserved. Positive control: re-run with
          # EDITOR_RESPONSE_INJECT_PAINT_MS set (e.g. 80) to confirm the gate still
          # FAILS on a uniform ~2x paint regression.
          EDITOR_RESPONSE_TRIMMED_MEAN_BUDGET_MS: 130
        run: npm run test:perf
