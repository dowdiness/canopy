name: 'Set up MoonBit'
description: >-
  Install the pinned MoonBit toolchain and core, and export NEW_MOON_MOD=0 for
  every downstream step. NEW_MOON_MOD=0 opts out of the rr_moon_mod
  TOML migration (moonbitlang/moon#1716), which otherwise drops path
  fields from cross-repo deps that have no valid TOML expression.
  Setup chosen after comparing three candidates on 2026-05-23 (run
  26330483536); see docs/2026-05-22-upstream-moonbit-rr-moon-mod-issue.md.

runs:
  using: composite
  steps:
    - name: Export NEW_MOON_MOD opt-out
      shell: bash
      run: echo "NEW_MOON_MOD=0" >> "$GITHUB_ENV"
    # MoonBit toolchain and core are pinned as a compatibility pair. The core
    # CDN publishes matching versioned archives (unlike older releases).
    # 0.10.4 fixes the wasm-gc v128/SIMD bundling bug seen in 0.10.0.
    - name: Install MoonBit
      uses: hustcer/setup-moonbit@v1.22
      with:
        version: 0.10.4+ade96c819
        core-version: 0.10.4+ade96c819
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Verify MoonBit core bundle
      shell: bash
      run: |
        for target in wasm wasm-gc js native; do
          test -f "$HOME/.moon/lib/core/_build/$target/release/bundle/prelude/prelude.mi"
        done

    - name: Cache MoonBit registry state
      uses: actions/cache@v5
      with:
        path: |
          ~/.moon/registry/index
          ~/.moon/registry/cache
          ~/.moon/registry/symbols
        key: moonbit-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/moon.mod.json', '**/moon.mod') }}
        restore-keys: |
          moonbit-registry-${{ runner.os }}-${{ runner.arch }}-
