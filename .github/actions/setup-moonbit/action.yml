name: 'Set up MoonBit'
description: >-
  Install the latest MoonBit toolchain and export NEW_MOON_MOD=0 for
  every downstream step. NEW_MOON_MOD=0 opts out of the rr_moon_mod
  TOML migration (moonbitlang/moon#1716), which otherwise drops path
  fields from cross-repo deps that have no valid TOML expression.
  Setup chosen after comparing three candidates on 2026-05-23 (run
  26330483536); see docs/2026-05-22-upstream-moonbit-rr-moon-mod-issue.md.

runs:
  using: composite
  steps:
    - name: Export NEW_MOON_MOD opt-out
      shell: bash
      run: echo "NEW_MOON_MOD=0" >> "$GITHUB_ENV"

    # core-version is intentionally left at its `latest` default. MoonBit's
    # core distribution offers no pinnable match: the CDN serves only
    # `core-latest.tar.gz` (versioned core archives 403), and
    # hustcer/setup-moonbit installs NO core alongside the toolchain, so
    # `setup-core: false` would leave the build with no stdlib. Neither
    # pinning core to 0.10.0+84519ca0a nor disabling setup-core is possible.
    # The pinned moonc below bundles whatever core source is current; a future
    # incompatible core release fails CI loudly (never silently) and is fixed
    # by the same toolchain-bump train. See PR #572.
    - name: Install MoonBit (pinned 0.10.0+84519ca0a)
      uses: hustcer/setup-moonbit@v1.22
      with:
        version: 0.10.0+84519ca0a
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Cache MoonBit registry state
      uses: actions/cache@v5
      with:
        path: |
          ~/.moon/registry/index
          ~/.moon/registry/cache
          ~/.moon/registry/symbols
        key: moonbit-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/moon.mod.json', '**/moon.mod') }}
        restore-keys: |
          moonbit-registry-${{ runner.os }}-${{ runner.arch }}-
