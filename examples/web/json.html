<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{} JSON CRDT Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      color: #4ec9b0;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      color: #858585;
      margin-bottom: 20px;
    }

    .examples-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      padding: 14px;
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      align-items: center;
    }

    .examples-label,
    .toolbar-label {
      color: #858585;
      font-size: 13px;
      margin-right: 4px;
    }

    .example-btn,
    .toolbar-btn,
    .inline-submit,
    .inline-cancel {
      padding: 7px 12px;
      background: #3c3c3c;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: background 0.2s, border-color 0.2s;
    }

    .example-btn:hover,
    .toolbar-btn:hover,
    .inline-submit:hover,
    .inline-cancel:hover {
      background: #4c4c4c;
      border-color: #666;
    }

    .toolbar-btn:disabled,
    .inline-submit:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel {
      background: #252526;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid #3c3c3c;
    }

    .panel-header h2 {
      color: #4ec9b0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .editor-shell {
      padding: 16px;
    }

.editor-wrapper {
  display: flex;
  position: relative;
}

.editor-gutter {
  width: 28px;
  flex-shrink: 0;
  background: #1e1e1e;
  border-right: 1px solid #2a2a2a;
  position: relative;
}

.json-editor-view {
  flex: 1;
  min-width: 0;
  min-height: 360px;
  padding: 14px;
  background: #1e1e1e;
  border: 1px solid #3c3c3c;
  border-radius: 0 4px 4px 0;
  position: relative;
  outline: none;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 15px;
  line-height: 1.6;
  overflow: auto;
  white-space: pre;
}

.json-editor-view:focus {
  border-color: #4ec9b0;
}

.editor-empty {
  color: #6a6a6a;
}

.gutter-btn {
  position: absolute;
  left: 3px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 20px;
  padding: 0;
  border: none;
  border-radius: 3px;
  background: transparent;
  color: #4a4a6a;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
}

.gutter-btn:hover {
  background: #252540;
  color: #82aaff;
}

#json-input.json-editor-raw {
  flex: 1;
  min-width: 0;
  min-height: 360px;
  padding: 14px;
  background: #1e1e1e;
  border: 1px solid #3c3c3c;
  border-radius: 0 4px 4px 0;
  position: relative;
  outline: none;
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}

#json-input.json-editor-raw:focus {
  border-color: #4ec9b0;
}

#json-input.json-editor-raw:empty::before {
  content: 'Type JSON here...';
  color: #6a6a6a;
}

.toolbar-btn.active {
  background: #8250df;
  border-color: #8250df;
  color: #fff;
}

.toolbar-btn.active:hover {
  background: #6f3fbf;
  border-color: #6f3fbf;
}

/* ── Structured JSON view ────────────────────────── */

.json-container {
  margin-left: 0;
}

.json-container .json-container {
  margin-left: 20px;
  border-left: 1px solid #2a2a48;
  padding-left: 12px;
}

.json-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 2px 4px;
  border-radius: 3px;
  white-space: nowrap;
}

.json-row:hover {
  background: #252540;
}

.json-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  font-size: 10px;
  color: #5a5a7a;
  cursor: pointer;
  flex-shrink: 0;
  user-select: none;
}

.json-toggle:hover {
  color: #c8c8e0;
}

.json-brace {
  color: #858585;
  font-weight: 500;
}

.json-summary {
  color: #5a5a7a;
  font-size: 13px;
  font-style: italic;
}

.json-key {
  color: #82aaff;
}

.json-colon {
  color: #858585;
  margin-right: 4px;
}

.json-value {
  cursor: text;
  padding: 1px 4px;
  border-radius: 2px;
  min-width: 20px;
}

.json-value:hover {
  background: #1e1e3e;
}

.json-value.json-string {
  color: #c3e88d;
}

.json-value.json-number {
  color: #f78c6c;
}

.json-value.json-bool {
  color: #c792ea;
}

.json-value.json-null {
  color: #c792ea;
  font-style: italic;
}

.json-value.json-error {
  color: #f48771;
  border-bottom: 1px wavy #f48771;
}

.json-value input {
  background: #1e1e1e;
  border: 1px solid #5a5a7a;
  color: #d4d4d4;
  font-family: inherit;
  font-size: inherit;
  padding: 1px 4px;
  border-radius: 2px;
  outline: none;
  min-width: 40px;
}

.json-value input:focus {
  border-color: #8250df;
}

.json-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  padding: 0;
  border: none;
  border-radius: 3px;
  background: transparent;
  color: #4a4a6a;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, background 0.15s;
}

.json-row:hover .json-btn {
  opacity: 1;
}

.json-btn:hover {
  background: #2a2a4a;
}

.json-btn-add {
  color: #4ec9b0;
}

.json-btn-del {
  color: #f48771;
}

.json-btn-add:hover {
  color: #6fdfc0;
}

.json-btn-del:hover {
  color: #f7a08e;
}

      overflow: hidden;
    }

    .errors-header {
      padding: 10px 14px;
      color: #4ec9b0;
      font-size: 13px;
      text-transform: uppercase;
      border-bottom: 1px solid #3c3c3c;
    }

    .error-list {
      list-style: none;
      padding: 12px 14px;
      min-height: 48px;
    }

    .error-item {
      color: #f48771;
      border-left: 3px solid #f48771;
      padding-left: 10px;
    }

    .error-item + .error-item {
      margin-top: 8px;
    }

    .error-empty {
      color: #6a6a6a;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #3c3c3c;
      align-items: center;
    }

    .inline-form {
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      width: 100%;
      padding-top: 8px;
    }

    .inline-form.visible {
      display: flex;
    }

    .inline-input {
      min-width: 160px;
      padding: 7px 10px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 3px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }

    .inline-input:focus {
      border-color: #4ec9b0;
    }

    .tree-view {
      padding: 16px;
      min-height: 420px;
      max-height: 70vh;
      overflow: auto;
      background: #1e1e1e;
    }

    .tree-empty {
      color: #6a6a6a;
    }

    .tree-node {
      margin-left: 14px;
      border-left: 1px solid #2a2a48;
      padding-left: 12px;
    }

    .tree-node.root {
      margin-left: 0;
      padding-left: 0;
      border-left: none;
    }

    .tree-node.collapsed > .node-children {
      display: none;
    }

    /* ── Toggle ───────────────────────────────────── */

    .node-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      font-size: 9px;
      color: #5a5a7a;
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 2px;
      background: transparent;
      border: 0;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s, background 0.15s;
    }

    .node-toggle:hover {
      color: #c8c8e0;
      background: #252540;
    }

    .node-toggle:focus-visible {
      outline: 2px solid #8250df;
      outline-offset: 1px;
    }

    /* ── Row ──────────────────────────────────────── */

    .node-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      margin: 2px 0;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
    }

    .node-row:hover {
      background: #252540;
    }

    .node-row.selected {
      background: rgba(130, 80, 223, 0.12);
      outline: 1px solid #8250df;
    }

    /* ── Key labels ───────────────────────────────── */

    .node-key {
      color: #82aaff;
    }

    .node-id {
      color: #5a5a7a;
      font-size: 11px;
    }

    .node-count {
      background: #252540;
      color: #5a5a7a;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
    }

    /* ── Type tags ────────────────────────────────── */

    .node-tag.object,
    .node-tag.array {
      color: #82aaff;
      font-weight: 600;
    }

    .node-tag.string {
      color: #c3e88d;
    }

    .node-tag.number {
      color: #f78c6c;
    }

    .node-tag.bool,
    .node-tag.null {
      color: #c792ea;
    }

    .node-tag.error {
      color: #cf222e;
    }

    .node-tag {
      display: inline-block;
      min-width: 24px;
      min-height: 1.4em;
    }

    .node-tag[data-empty="true"]::after {
      content: '""';
      color: #5a5a7a;
      font-style: italic;
    }

    .node-tag input,
    .node-key input {
      background: #1e1e1e;
      border: 1px solid #5a5a7a;
      color: #d4d4d4;
      font-family: inherit;
      font-size: inherit;
      padding: 1px 4px;
      border-radius: 2px;
      outline: none;
      min-width: 40px;
    }

    .node-tag input:focus,
    .node-key input:focus {
      border-color: #8250df;
    }

    /* ── Value nodes (scalars) ────────────────────── */

    .node-row.value-node {
      padding-left: 24px;
    }

    .node-row.value-node .node-id {
      opacity: 0.5;
    }

    .node-row.value-node:hover .node-id {
      opacity: 1;
    }


    /* ── Inline controls (action buttons, type dropdown) ──────── */

    .node-actions {
      display: none;
      margin-left: auto;
      gap: 2px;
      flex-shrink: 0;
    }

    .node-row:hover .node-actions,
    .node-row.selected .node-actions {
      display: inline-flex;
    }

    /* Structured view: always show action buttons (no hover needed) */
    #json-editor-view .node-actions {
      display: inline-flex;
    }

    /* Structured view: always show type select (no row selection needed) */
    #json-editor-view .node-type-select {
      display: inline-block;
    }

    .node-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 20px;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      background: #2a2a3e;
      color: #7a7a9a;
      border: 1px solid #3a3a5a;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .node-action-btn:hover {
      background: #3a3a5a;
      color: #c8c8e0;
      border-color: #5a5a7a;
    }

    .node-action-btn:focus-visible {
      outline: 2px solid #8250df;
      outline-offset: 1px;
    }

    .node-type-select {
      display: none;
      font-size: 10px;
      padding: 1px 2px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid #3a3a5a;
      border-radius: 3px;
      font-family: inherit;
      cursor: pointer;
      max-width: 70px;
    }

    .node-row.selected .node-type-select {
      display: inline-block;
    }
    .decoration-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .decoration-overlay .widget-btn {
      pointer-events: auto;
    }

    .widget-btn {
      position: absolute;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      padding: 0;
      border: 1px solid #3a3a5a;
      border-radius: 50%;
      background: #252540;
      color: #7a7a9a;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .widget-btn:hover {
      background: #3a3a5a;
      color: #c8c8e0;
      border-color: #5a5a7a;
    }


    .decoration-mark {
      position: absolute;
      pointer-events: none;
      border-radius: 2px;
    }

    .json-role-property-key {
      background-color: rgba(156, 220, 254, 0.12);
    }

    .json-role-string-value {
      background-color: rgba(206, 145, 120, 0.15);
    }

    .json-role-number-literal {
      background-color: rgba(181, 206, 168, 0.13);
    }

    .json-role-boolean-literal {
      background-color: rgba(86, 156, 214, 0.13);
    }

    .json-role-null-literal {
      background-color: rgba(86, 156, 214, 0.13);
    }

    .json-role-punctuation {
      background-color: rgba(128, 128, 128, 0.10);
    }

    .json-role-error {
      background-color: rgba(244, 135, 113, 0.18);
      border-bottom: 1px wavy #f48771;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .tree-view {
        max-height: none;
      }
    }

    /* ── Patch log panel ───────────────────────────── */

    .patch-log-panel {
      margin-top: 20px;
    }

    .patch-log-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
    }

    .patch-log-header:hover {
      background: #2a2a2a;
    }

    .patch-log-count {
      background: #252540;
      color: #7a7a9a;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 8px;
      min-width: 20px;
      text-align: center;
    }

    .patch-log-toggle {
      font-size: 11px;
      color: #5a5a7a;
      margin-left: auto;
      transition: transform 0.2s;
    }

    .patch-log-toggle.collapsed {
      transform: rotate(-90deg);
    }

    .patch-log-body {
      max-height: 480px;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    .patch-log-body.hidden {
      display: none;
    }

    .patch-log-empty {
      color: #6a6a6a;
      font-size: 13px;
      padding: 16px 0;
      text-align: center;
    }

    .patch-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      margin: 3px 0;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
    }

    .patch-entry:hover {
      border-color: #3a3a5a;
    }

    .patch-entry + .patch-entry {
      margin-top: 4px;
    }

    .patch-entry-time {
      color: #5a5a7a;
      white-space: nowrap;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .patch-entry-op {
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .patch-entry-op.Delete { color: #f48771; }
    .patch-entry-op.AddMember,
    .patch-entry-op.AddElement { color: #c3e88d; }
    .patch-entry-op.WrapInArray,
    .patch-entry-op.WrapInObject { color: #82aaff; }
    .patch-entry-op.Unwrap { color: #c792ea; }
    .patch-entry-op.ChangeType { color: #ffcb6b; }
    .patch-entry-op.RenameKey { color: #89ddff; }
    .patch-entry-op.CommitEdit { color: #a0a0a0; }

    .patch-entry-params {
      color: #858585;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .patch-entry-ok {
      color: #4ec9b0;
      flex-shrink: 0;
    }

    .patch-entry-err {
      color: #f48771;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>{} JSON CRDT Editor</h1>
    <p class="subtitle">Structural JSON editing with CRDT collaboration</p>

    <div class="examples-bar">
      <span class="examples-label">Examples:</span>
      <button class="example-btn" data-example='{"hello": "world"}'>Simple</button>
      <button class="example-btn" data-example='{"name":"Canopy","enabled":true,"count":3}'>Object</button>
      <button class="example-btn" data-example='["alpha", 42, false, null]'>Array</button>
      <button class="example-btn" data-example='{"user":{"name":"Ada","roles":["admin","editor"]},"meta":{"active":true,"visits":12}}'>Nested</button>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header" style="display:flex;align-items:center;gap:10px">
          <h2>JSON Text</h2>
          <button id="format-btn" class="toolbar-btn" type="button">Format</button>
          <button id="struct-toggle-btn" class="toolbar-btn" type="button" style="margin-left:auto">▦ Structured</button>
        </div>
        <div class="editor-shell">
          <div class="editor-wrapper">
            <div id="json-gutter" class="editor-gutter"></div>
            <div id="json-input" contenteditable="plaintext-only" spellcheck="false" class="json-editor-raw"></div>
            <div id="json-editor-view" class="json-editor-view" style="display:none"></div>
          </div>

          <div class="errors-panel" id="errors-panel">
            <div class="errors-header">Parse Errors</div>
            <ul id="parse-errors" class="error-list"></ul>
          </div>
        </div>
        <section class="panel patch-log-panel" id="patch-log-panel" style="border:none;margin-top:0;border-top:1px solid #3c3c3c">
          <div class="panel-header patch-log-header" id="patch-log-header">
            <h2>Edit Log <span id="patch-log-count" class="patch-log-count">0</span></h2>
            <span id="patch-log-toggle" class="patch-log-toggle">▾</span>
          </div>
          <div id="patch-log-body" class="patch-log-body">
            <div id="patch-log-empty" class="patch-log-empty">No edits yet.</div>
          </div>
        </section>
      </section>
        <div id="tree-view" style="display:none"></div>

    </div>

  </div>

  <script type="module" src="/src/json-editor.ts"></script>
</body>
</html>
