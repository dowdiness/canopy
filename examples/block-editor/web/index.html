<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Block Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; color: #e8e8f0; font-family: 'Inter', sans-serif; }

    nav[aria-label="Document tools"] {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(130, 160, 255, 0.15);
    }

    nav[aria-label="Document tools"] button {
      padding: 6px 14px;
      background: rgba(130, 160, 255, 0.1);
      border: 1px solid rgba(130, 160, 255, 0.25);
      border-radius: 6px;
      color: #e8e8f0;
      font-size: 13px;
      cursor: pointer;
    }
    nav[aria-label="Document tools"] button:hover {
      background: rgba(130, 160, 255, 0.2);
    }
    nav[aria-label="Document tools"] button:focus-visible {
      outline: 2px solid #8250df;
      outline-offset: 2px;
    }

    #editor-blocks {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    /* Block focus indicator */
    #editor-blocks [contenteditable]:focus-visible {
      outline: none;
      box-shadow: -3px 0 0 0 #8250df;
    }
    #editor-blocks [contenteditable]:focus:not(:focus-visible) {
      outline: none;
    }

    /* Empty editor placeholder */
    #editor-blocks:empty::after {
      content: "Start typing or upload a .md file";
      color: #5a5a7a;
      font-style: italic;
      display: block;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <nav aria-label="Document tools">
    <button id="btn-download">Download .md</button>
    <button id="btn-upload">Upload .md</button>
    <input type="file" id="file-input" accept=".md" aria-label="Upload markdown file" style="display:none" />
  </nav>
  <main>
    <div id="editor-blocks" role="textbox" aria-multiline="true" aria-label="Document editor"></div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
