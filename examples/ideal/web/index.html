<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canopy Editor</title>

  <!-- Preconnect to font CDNs (parallel, non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

  <!-- Load fonts via <link> instead of CSS @import (avoids waterfall) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.1.0/latin-400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.1.0/latin-500.css">

  <link rel="stylesheet" href="/styles/editor.css">

  <!-- Inline critical CSS for loading skeleton -->
  <style>
    body { margin: 0; background: #1a1a2e; }
    .loading-skeleton {
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-family: 'Manrope', system-ui, sans-serif;
      color: #8888a8;
    }
    .loading-toolbar {
      height: 44px;
      background: #151528;
      border-bottom: 1px solid #2a2a48;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    .loading-toolbar span {
      font-size: 13px;
      opacity: 0.6;
    }
    .loading-workspace {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #2a2a48;
      border-top-color: #8250df;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .loading-spinner { animation: none; opacity: 0.5; }
    }
  </style>
</head>
<body>
  <!-- Loading skeleton shown while MoonBit modules download (2.8MB) -->
  <div id="app" class="loading-skeleton">
    <div class="loading-toolbar">
      <span>Canopy Editor</span>
    </div>
    <div class="loading-workspace">
      <div class="loading-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
