<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canopy Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f1a; }

    #canvas-root {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    #canvas-root.panning { cursor: grabbing; }

    #world {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      /* transform set by JS */
    }

    /* Future hybrid: Canvas 2D overlay for selection handles, arrows */
    #overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: none; /* enable when drawOverlay is implemented */
    }

    .canvas-node {
      position: absolute;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .canvas-node.selected {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px #8250df;
    }
    .canvas-node[data-kind="Text"] {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: #e8e8f0;
      background: rgba(130, 160, 255, 0.08);
      border: 1px solid rgba(130, 160, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="canvas-root">
    <div id="world"></div>
    <canvas id="overlay"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
